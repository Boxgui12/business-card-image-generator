<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Business Card Image Generator Square Logo</title>
  <desc id="desc">Square version of the project logo for folder and profile use.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="920" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071423"/>
      <stop offset="0.55" stop-color="#0C2340"/>
      <stop offset="1" stop-color="#09101D"/>
    </linearGradient>
    <linearGradient id="cardA" x1="190" y1="300" x2="420" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#123253"/>
      <stop offset="1" stop-color="#1C5B8A"/>
    </linearGradient>
    <linearGradient id="cardB" x1="235" y1="350" x2="545" y2="625" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F385F"/>
      <stop offset="1" stop-color="#0D2238"/>
    </linearGradient>
    <linearGradient id="strokeAccent" x1="270" y1="380" x2="605" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2FD7FF"/>
      <stop offset="0.55" stop-color="#67B6FF"/>
      <stop offset="1" stop-color="#F4C542"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="238" y1="720" x2="786" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#DCE9F5"/>
    </linearGradient>
    <linearGradient id="subtitleFill" x1="292" y1="812" x2="732" y2="812" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2FD7FF"/>
      <stop offset="0.5" stop-color="#B7E8FF"/>
      <stop offset="1" stop-color="#F4C542"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="80" fill="url(#bg)"/>
  <circle cx="176" cy="158" r="110" fill="#2FD7FF" fill-opacity="0.08"/>
  <circle cx="848" cy="172" r="140" fill="#F4C542" fill-opacity="0.06"/>
  <circle cx="820" cy="842" r="210" fill="#2FD7FF" fill-opacity="0.03"/>
  <circle cx="228" cy="826" r="160" fill="#F4C542" fill-opacity="0.04"/>

  <g filter="url(#shadow)">
    <rect x="214" y="252" width="286" height="198" rx="30" transform="rotate(-8 214 252)" fill="url(#cardA)" fill-opacity="0.92"/>
    <rect x="264" y="276" width="286" height="198" rx="30" fill="url(#cardB)" fill-opacity="0.96" stroke="url(#strokeAccent)" stroke-width="5"/>
    <rect x="548" y="318" width="120" height="120" rx="22" fill="#123253" stroke="#2FD7FF" stroke-width="5"/>
    <path d="M580 400L608 366L633 388L659 353" stroke="#67B6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="589" cy="348" r="12" fill="#B7E8FF"/>
    <circle cx="360" cy="352" r="28" fill="#7EC8FF"/>
    <path d="M316 408C320 377 341 360 360 360C379 360 400 377 404 408" stroke="#7EC8FF" stroke-width="13" stroke-linecap="round"/>
    <rect x="413" y="345" width="114" height="15" rx="7.5" fill="#EAF3FB" fill-opacity="0.92"/>
    <rect x="413" y="383" width="114" height="15" rx="7.5" fill="#EAF3FB" fill-opacity="0.92"/>
    <rect x="413" y="421" width="64" height="13" rx="6.5" fill="#F4C542" fill-opacity="0.96"/>
    <path d="M676 246L692 280L726 296L692 312L676 346L659 312L625 296L659 280L676 246Z" fill="#F4C542"/>
  </g>

  <text x="512" y="736" text-anchor="middle" fill="url(#titleFill)" font-family="Manrope, Segoe UI, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-1.5">
    Business Card
  </text>
  <text x="512" y="804" text-anchor="middle" fill="url(#subtitleFill)" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="8">
    IMAGE GENERATOR
  </text>
  <line x1="292" y1="842" x2="420" y2="842" stroke="#2FD7FF" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
  <line x1="604" y1="842" x2="732" y2="842" stroke="#F4C542" stroke-opacity="0.6" stroke-width="4" stroke-linecap="round"/>
</svg>
